{% extends "base.html" %}

{% block title %}Main Page{% endblock %}

{% block content %}
        <div class="p-4 p-md-5 mb-4 bg-light rounded-4 text-center">
            <h1 class="display-5 fw-bold">Current Issues</h1>
            <p class="col-md-8 mx-auto fs-5 text-muted mb-0">
                A live overview of issues logged on site.
            </p>
        </div>

        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <caption>List of users</caption>
                <thead>
                <tr>
                  <th scope="col">ID</th>
                  <th scope="col">First</th>
                  <th scope="col">Second</th>
                  <th scope="col">Third</th>
                </tr>
                </thead>
                <tbody>
                    <tr>
                      <td colspan="4" class="text-center text-muted py-4">No issues to display yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
{% endblock %}
